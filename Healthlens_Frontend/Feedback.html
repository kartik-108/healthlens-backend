<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Feedback - HealthLens Hospital</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="css/feedback.css">
</head>

<body class="bg-gray-100 text-gray-800 scroll-smooth">

<div id="navbar-container"></div>


<!-- Hero -->
<section class="relative h-64 flex flex-col justify-center items-center text-center hero-bg">
  <h1 class="text-4xl md:text-5xl font-bold text-white">We Value Your Feedback</h1>
  <p class="mt-4 text-lg md:text-xl text-white">Help us improve your healthcare experience</p>

  <i class="fas fa-heart floating-icon text-red-400" style="top:20%; left:10%;"></i>
  <i class="fas fa-stethoscope floating-icon text-yellow-400" style="top:40%; left:80%;"></i>
  <i class="fas fa-notes-medical floating-icon text-green-400" style="top:60%; left:30%;"></i>
</section>

<!-- Feedback Form -->
<section class="py-20 bg-gray-50 fadeIn" id="formSection">
  <div class="container mx-auto max-w-2xl bg-white shadow-lg rounded-xl p-10 card-hover">
    <h2 class="text-3xl font-bold mb-6 text-center">Submit Your Feedback</h2>

    <form id="feedbackForm">
      <div class="mb-6 group">
        <input type="text" placeholder=" " required class="w-full border border-gray-300 p-3 rounded-lg transition" />
        <label>Name</label>
      </div>

      <div class="mb-6 group">
        <input type="email" placeholder=" " required class="w-full border border-gray-300 p-3 rounded-lg transition" />
        <label>Email</label>
      </div>

      <div class="mb-6 group">
        <textarea placeholder=" " required class="w-full border border-gray-300 p-3 rounded-lg h-32 transition"></textarea>
        <label>Feedback</label>
      </div>

      <div class="flex justify-center gap-3 mb-4">
        <span class="cursor-pointer text-2xl emoji" data-emoji="😊">😊</span>
        <span class="cursor-pointer text-2xl emoji" data-emoji="😐">😐</span>
        <span class="cursor-pointer text-2xl emoji" data-emoji="😞">😞</span>
      </div>

      <div class="text-center">
        <button type="submit"
          class="btn-hover bg-gradient-to-r from-blue-600 to-indigo-700 text-white px-8 py-3 rounded-lg hover:from-indigo-700 hover:to-blue-600 transition relative overflow-hidden">
          Submit
        </button>
      </div>

      <div class="success-msg" id="successMsg">
        Thank you! Your feedback has been submitted.
      </div>
    </form>
  </div>
</section>

  <!-- COMMON FOOTER -->
  <div id="footer-container"></div>
  <script src="js/footer.js"></script>


<canvas id="confetti"></canvas>

<!-- Custom JS -->
<script src="js/feedback.js"></script>

  <!-- Scripts -->
  <script src="js/navbar.js"></script>
  <script src="js/auth-ui.js"></script>
</body>
</html>
