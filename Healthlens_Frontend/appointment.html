<html lang="en">
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/appointment.css">
</head>

<body class="bg-gray-100 text-gray-800">

<!-- Navbar -->
<nav class="bg-gradient-to-r from-blue-700 to-indigo-800 shadow-lg sticky top-0 z-50">
  <div class="container mx-auto flex justify-between items-center py-4 px-6">
    <a href="index.html" class="text-3xl font-extrabold text-white tracking-wide font-[Montserrat]">
      Health<span class="text-yellow-400">Lens</span>🏥
    </a>

    <ul class="hidden md:flex space-x-8 text-white font-medium">
      <li><a href="index.html" class="hover:text-yellow-300 transition">Home</a></li>
      <li><a href="appointment.html" class="hover:text-yellow-300 transition">Appointment</a></li>
      <li><a href="my-appointments.html" class="hover:text-yellow-300 transition">My Appointments</a></li>
      <li><a href="services.html" class="hover:text-yellow-300 transition">Services</a></li>
      <li><a href="emergency.html" class="hover:text-yellow-300 transition">Emergency</a></li>
      <li><a href="feedback.html" class="hover:text-yellow-300 transition">Feedback</a></li>
    </ul>

    <div class="flex space-x-4">
      <a href="login.html"
         class="px-4 py-2 rounded-lg border-2 border-yellow-400 text-yellow-400 hover:bg-yellow-400 hover:text-blue-900 font-semibold transition">
        Login
      </a>
      <a href="signup.html"
         class="px-4 py-2 rounded-lg bg-yellow-400 text-blue-900 font-semibold shadow-md hover:shadow-lg transition">
        Sign Up
      </a>
    </div>
  </div>
</nav>

<!-- Appointment Form -->
<section class="container mx-auto py-12 px-6">
  <h1 class="text-3xl font-bold text-center mb-8">Book Your Appointment</h1>

  <form class="bg-white shadow-md rounded-lg p-8 max-w-2xl mx-auto space-y-6">
    <!-- Department -->
    <div>
      <label class="block font-semibold mb-2">Select Department</label>
      <select id="departmentSelect" name="department" class="w-full border rounded-lg px-4 py-2">
        <option value="">-- Select Department --</option>
        <option value="Cardiology">Cardiology</option>
        <option value="Neurology">Neurology</option>
        <option value="Pediatrics">Pediatrics</option>
        <option value="Orthopedics">Orthopedics</option>
        <option value="Oncology">Oncology</option>
        <option value="Dermatology">Dermatology</option>
        <option value="Radiology">Radiology</option>
      </select>
    </div>

    <!-- Patient Info -->
    <div>
      <label class="block font-semibold mb-2">Full Name</label>
      <input type="text" class="w-full border rounded-lg px-4 py-2" required>
    </div>

    <div>
      <label class="block font-semibold mb-2">Email</label>
      <input type="email" class="w-full border rounded-lg px-4 py-2" required>
    </div>

    <div>
      <label class="block font-semibold mb-2">Phone</label>
      <input type="tel" class="w-full border rounded-lg px-4 py-2" required>
    </div>

    <!-- Submit -->
    <button type="submit"
            class="bg-yellow-400 text-blue-900 px-6 py-3 rounded-lg font-bold shadow-md hover:shadow-lg transition">
      Confirm Appointment
    </button>
  </form>
</section>

<!-- Footer -->
<footer class="bg-blue-600 text-white text-center py-4 mt-10">
  <p>&copy; 2025 HealthLens Hospital | All Rights Reserved</p>
</footer>

<!-- Custom JS -->
<script src="js/appointment.js"></script>
</body>
</html>
