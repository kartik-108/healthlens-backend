<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | HealthLens Hospital</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/signup.css">
</head>

<body>

<!-- Navbar -->
<nav class="bg-gradient-to-r from-blue-700 to-indigo-800 shadow-lg sticky top-0 z-50">
  <div class="container mx-auto flex justify-between items-center py-4 px-6">
    
    <a href="index.html" class="text-3xl font-extrabold text-white tracking-wide font-[Montserrat]">
      Health<span class="text-yellow-400">Lens</span>🏥
    </a>

    <ul class="hidden md:flex space-x-8 text-white font-medium">
      <li><a href="index.html" class="hover:text-yellow-300 transition">Home</a></li>
      <li><a href="appointment.html" class="hover:text-yellow-300 transition">Appointment</a></li>
      <li><a href="my-appointments.html" class="hover:text-yellow-300 transition">My Appointments</a></li>
      <li><a href="services.html" class="hover:text-yellow-300 transition">Services</a></li>
      <li><a href="emergency.html" class="hover:text-yellow-300 transition">Emergency</a></li>
      <li><a href="feedback.html" class="hover:text-yellow-300 transition">Feedback</a></li>
    </ul>

    <div class="flex space-x-4">
      <a href="login.html"
         class="px-4 py-2 rounded-lg border-2 border-yellow-400 text-yellow-400 hover:bg-yellow-400 hover:text-blue-900 font-semibold transition">
        Login
      </a>
      <a href="signup.html"
         class="px-4 py-2 rounded-lg bg-yellow-400 text-blue-900 font-semibold shadow-md hover:shadow-lg transition">
        Sign Up
      </a>
    </div>
  </div>
</nav>

<!-- Sign Up Card -->
<div class="flex justify-center items-center flex-grow">
  <div class="bg-white rounded-xl shadow-lg p-10 w-full max-w-md mt-12 animate-fadeInUp">
    <h2 class="text-3xl font-bold text-center mb-6 text-blue-600">Create an Account</h2>

    <!-- 🔥 FIXED FORM -->
    <form id="signupForm" class="flex flex-col gap-4">

      <input
        type="text"
        id="username"
        name="username"
        placeholder="Full Name"
        class="border p-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
        required
      >

      <input
        type="email"
        id="email"
        name="email"
        placeholder="Email"
        class="border p-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
        required
      >

      <input
        type="password"
        id="password"
        name="password"
        placeholder="Password"
        class="border p-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
        required
      >

      <input
        type="password"
        id="confirmPassword"
        name="confirm_password"
        placeholder="Confirm Password"
        class="border p-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
        required
      >

      <button
        type="submit"
        class="bg-blue-600 text-white px-4 py-3 rounded-lg hover:bg-blue-700 ripple transition">
        Sign Up
      </button>

    </form>

    <p class="mt-4 text-gray-600 text-center text-sm">
      Already have an account?
      <a href="login.html" class="text-blue-600 hover:underline">Login here</a>
    </p>
  </div>
</div>

<!-- Custom JS -->
<script src="js/signup.js"></script>
</body>
</html>
