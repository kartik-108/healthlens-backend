<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | HealthLens Hospital</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body {
  background: linear-gradient(135deg, #6B73FF, #000DFF);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: 'Poppins', sans-serif;
}
.animate-fadeInUp {
  animation: fadeInUp 1s ease forwards;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.ripple {
  position: relative;
  overflow: hidden;
}
.ripple:after {
  content: "";
  position: absolute;
  width: 100px; 
  height: 100px;
  background: rgba(255,255,255,0.3);
  display: block;
  border-radius: 50%;
  transform: scale(0);
  opacity: 1;
  pointer-events: none;
  animation: ripple-effect 0.6s linear;
}
@keyframes ripple-effect {
  to { transform: scale(4); opacity: 0; }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="bg-gradient-to-r from-blue-700 to-indigo-800 shadow-lg sticky top-0 z-50">
  <div class="container mx-auto flex justify-between items-center py-4 px-6">
    
    <!-- Logo -->
    <a href="index.html" class="text-3xl font-extrabold text-white tracking-wide font-[Montserrat]">
      Health<span class="text-yellow-400">Lens</span>🏥
    </a>

    <!-- Links -->
    <ul class="hidden md:flex space-x-8 text-white font-medium">
      <li><a href="index.html" class="hover:text-yellow-300 transition">Home</a></li>
      <li><a href="appointment.html" class="hover:text-yellow-300 transition">Appointment</a></li>
      <li><a href="my-appointments.html" class="hover:text-yellow-300 transition">My Appointments</a></li>
      <li><a href="services.html" class="hover:text-yellow-300 transition">Services</a></li>
      <li><a href="emergency.html" class="hover:text-yellow-300 transition">Emergency</a></li>
      <li><a href="feedback.html" class="hover:text-yellow-300 transition">Feedback</a></li>
    </ul>

    <!-- Buttons -->
    <div class="flex space-x-4">
      <a href="login.html" class="px-4 py-2 rounded-lg border-2 border-yellow-400 text-yellow-400 hover:bg-yellow-400 hover:text-blue-900 font-semibold transition">
        Login
      </a>
      <a href="signup.html" class="px-4 py-2 rounded-lg bg-yellow-400 text-blue-900 font-semibold shadow-md hover:shadow-lg transition">
        Sign Up
      </a>
    </div>
  </div>
</nav>

<!-- Login Card -->
<div class="flex justify-center items-center flex-grow">
  <div class="bg-white rounded-xl shadow-lg p-10 w-full max-w-md mt-12 animate-fadeInUp">
    <h2 class="text-3xl font-bold text-center mb-6 text-blue-600">Login to HealthLens</h2>
    <form action="#" method="POST" class="flex flex-col gap-4">
      <input type="email" name="email" placeholder="Email" class="border p-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" required>
      <input type="password" name="password" placeholder="Password" class="border p-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" required>
      <button type="submit" class="bg-blue-600 text-white px-4 py-3 rounded-lg hover:bg-blue-700 ripple transition">Login</button>
    </form>
    <p class="mt-4 text-gray-600 text-center text-sm">
      Don't have an account? <a href="signup.html" class="text-blue-600 hover:underline">Sign up here</a>
    </p>
  </div>
</div>

<script>
  // Button ripple effect
  document.querySelectorAll('.ripple').forEach(btn => {
    btn.addEventListener('click', e => {
      const circle = document.createElement('span');
      const rect = btn.getBoundingClientRect();
      circle.className = 'ripple';
      circle.style.left = `${e.clientX - rect.left - 50}px`;
      circle.style.top = `${e.clientY - rect.top - 50}px`;
      btn.appendChild(circle);
      setTimeout(() => circle.remove(), 600);
    });
  });
</script>

</body>
</html>
